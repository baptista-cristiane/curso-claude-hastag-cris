<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Curso — Claude Hashtag</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1b3e;
    --surface: #152550;
    --surface-2: #1c2f60;
    --border: #2a3f72;
    --accent: #c4b5fd;
    --accent-soft: rgba(196,181,253,0.15);
    --green: #4ade80;
    --green-soft: rgba(74,222,128,0.13);
    --amber: #fbbf24;
    --amber-soft: rgba(251,191,36,0.13);
    --text: #ffffff;
    --text-muted: #ffffff;
    --text-dim: #ffffffaa;
    --done-row: rgba(74,222,128,0.08);
    --done-border: rgba(74,222,128,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .wrapper {
    max-width: 860px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 1.1666rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(196,181,253,0.3);
    border-radius: 4px;
    padding: 5px 12px;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 2.1666rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1.0666rem;
  }

  /* Stats cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }

  .stat-card.total { border-color: rgba(196,181,253,0.35); }
  .stat-card.done  { border-color: rgba(74,222,128,0.3); }
  .stat-card.left  { border-color: rgba(251,191,36,0.3); }

  .stat-label {
    font-size: 0.8866rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4666rem;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 0.2rem;
  }
  .stat-card.total .stat-value { color: var(--accent); }
  .stat-card.done  .stat-value { color: var(--green); }
  .stat-card.left  .stat-value { color: var(--amber); }

  .stat-sub {
    font-size: 0.8866rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.3rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-label {
    font-size: 1.0833rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 120px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--surface-2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.0833rem;
    font-weight: 700;
    color: var(--green);
    min-width: 44px;
    text-align: right;
  }

  /* Table */
  .table-header {
    display: grid;
    grid-template-columns: 36px 1fr 100px 72px;
    gap: 0;
    padding: 0.5rem 1rem;
    font-size: 0.8666rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ffffff;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.25rem;
  }

  .table-header span:nth-child(3),
  .table-header span:nth-child(4) { text-align: right; }

  .row {
    display: grid;
    grid-template-columns: 36px 1fr 100px 72px;
    align-items: center;
    gap: 0;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    margin-bottom: 3px;
    transition: background 0.15s, border-color 0.15s;
    cursor: pointer;
  }

  .row:hover { background: var(--surface-2); }

  .row.done {
    background: var(--done-row);
    border-color: var(--done-border);
  }

  .row-num {
    font-family: 'Inter', sans-serif;
    font-size: 1.0166rem;
    font-weight: 600;
    color: #ffffff;
  }

  .row-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.0666rem;
    font-weight: 500;
    color: #ffffff;
    padding-right: 1rem;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row.done .row-title { color: var(--green); }
  .row.done .row-num   { color: var(--green); }

  .row-tempo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9666rem;
    color: #ffffff;
    text-align: right;
  }

  .row.done .row-tempo { color: rgba(74,222,128,0.85); }

  .check-cell { text-align: right; }

  .check-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 60px;
    height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: #ffffff;
    font-size: 0.8866rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .check-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .check-btn.checked {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-soft);
  }

  /* Save note */
  .save-note {
    text-align: center;
    font-size: 1.0833rem;
    font-weight: 600;
    color: #ffffff;
    margin-top: 1.5rem;
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr; }
    h1 { font-size: 1.6666rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="badge">Curso Hashtag · Claude AI</div>
    <h1>O Ecossistema de IA do Claude</h1>
    <p class="subtitle">Acompanhe seu progresso: clique em cada aula para marcar como concluída</p>
  </div>

  <div class="stats">
    <div class="stat-card total">
      <div class="stat-label">Tempo total</div>
      <div class="stat-value" id="total-val">—</div>
      <div class="stat-sub" id="total-sub"></div>
    </div>
    <div class="stat-card done">
      <div class="stat-label">Realizado</div>
      <div class="stat-value" id="done-val">00:00:00</div>
      <div class="stat-sub" id="done-sub"></div>
    </div>
    <div class="stat-card left">
      <div class="stat-label">A realizar</div>
      <div class="stat-value" id="left-val">—</div>
      <div class="stat-sub" id="left-sub"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <span class="progress-label" id="prog-label">0 de 20 aulas</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>

  <div class="table-header">
    <span>#</span>
    <span>Aula</span>
    <span style="text-align:right">Tempo</span>
    <span style="text-align:right">Status</span>
  </div>

  <div id="lesson-list"></div>

  <div class="save-note">✦ Seu progresso é salvo automaticamente neste navegador.</div>

</div>

<script>
const LESSONS = [
  { title: "Apresentação de módulo",                                        sec: 1*60+16  },
  { title: "Introdução ao ecossistema Claude",                              sec: 4*60+29  },
  { title: "Planos disponíveis do Claude",                                  sec: 8*60+10  },
  { title: "Configurações iniciais: Claude Chat",                           sec: 4*60+15  },
  { title: "O que é o Claude Chat — A Essência por Trás da Ferramenta",    sec: 5*60+7   },
  { title: "Primeiros Passos: Claude Chat",                                 sec: 10*60+9  },
  { title: "Prompt Engineering: Fundamentos",                               sec: 16*60+12 },
  { title: "Framework de Prompt Estruturado / Prompt em camadas",           sec: 5*60+41  },
  { title: "Praticando Método GOAL",                                        sec: 13*60+8  },
  { title: "Framework SMART aplicado à IA",                                 sec: 3*60+16  },
  { title: "Praticando Método SMART",                                       sec: 8*60+31  },
  { title: "Recursos avançados do Claude — parte 1",                        sec: 16*60+11 },
  { title: "Recursos avançados do Claude — parte 2",                        sec: 14*60+32 },
  { title: "Configurações personalizadas",                                  sec: 11*60+22 },
  { title: "Claude como sistema operacional de IA",                         sec: 14*60+14 },
  { title: "Trabalhando com Projetos — parte 1",                            sec: 16*60+40 },
  { title: "Trabalhando com Projetos — parte 2",                            sec: 12*60+4  },
  { title: "O que são Skills no Claude?",                                   sec: 25*60+25 },
  { title: "Conectores do Claude",                                          sec: 22*60+59 },
  { title: "Próximos passos...",                                            sec: 4*60+38  },
];

const STORAGE_KEY = 'hashtag_claude_progress';

function fmtTime(sec) {
  const hh = Math.floor(sec / 3600);
  const mm = Math.floor((sec % 3600) / 60);
  const ss = sec % 60;
  return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

function loadDone() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveDone(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

let done = loadDone();
const allSec = LESSONS.reduce((a, l) => a + l.sec, 0);
function totalSec(idx) { return idx.reduce((a, i) => a + LESSONS[i].sec, 0); }

function updateStats() {
  const doneSec = totalSec(done);
  const leftSec = allSec - doneSec;
  const timePct = Math.round((doneSec / allSec) * 100);
  document.getElementById('total-val').textContent = fmtTime(allSec);
  document.getElementById('done-val').textContent  = fmtTime(doneSec);
  document.getElementById('left-val').textContent  = fmtTime(leftSec);
  document.getElementById('prog-label').textContent = done.length + ' de ' + LESSONS.length + ' aulas';
  document.getElementById('prog-fill').style.width  = timePct + '%';
  document.getElementById('prog-pct').textContent   = timePct + '%';
}

function renderRows() {
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  LESSONS.forEach((l, i) => {
    const isDone = done.includes(i);
    const row = document.createElement('div');
    row.className = 'row' + (isDone ? ' done' : '');
    row.innerHTML =
      '<span class="row-num">' + String(i+1).padStart(2,'0') + '</span>' +
      '<span class="row-title">' + l.title + '</span>' +
      '<span class="row-tempo">' + fmtTime(l.sec) + '</span>' +
      '<span class="check-cell"><button class="check-btn' + (isDone ? ' checked' : '') + '" data-i="' + i + '">' + (isDone ? '✓ OK' : 'marcar') + '</button></span>';
    list.appendChild(row);
  });
  list.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(btn.dataset.i);
      if (done.includes(i)) done = done.filter(x => x !== i);
      else done.push(i);
      saveDone(done);
      renderRows();
      updateStats();
    });
  });
}

renderRows();
updateStats();
</script>
</body>
</html>
